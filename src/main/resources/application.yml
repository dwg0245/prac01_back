# 내가 뭔가를 쓰고 싶을때 변수 처럼 쓴다.
#토큰
jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE}

# 이미지 업로드 경로
project:
  upload:
    path: ${UPLOAD_PATH}

  aes:
    #32 바이트 (32글자 여야 한다.)
    key: aessecretkey12345678912345678900

spring:
  # DB 설정
  datasource:
    master:
      driver-class-name: org.mariadb.jdbc.Driver
      username: ${DB_USER}
      password: ${DB_PASS}
      jdbc-url: ${MASTER_DB_URL}
    slave:
      driver-class-name: org.mariadb.jdbc.Driver
      username: ${DB_USER}
      password: ${DB_PASS}
      jdbc-url: ${SLAVE_DB_URL}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          # 카카오 소셜 로그인 설정
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: kakao
            redirect-uri: ${KAKAO_REDIRECT_URI}
            # 카카오 로그인하기 할때, 따로 설정을 해야 됨
            authorization-grant-type: authorization_code
              # 어떤걸 받아 갈 건지
            scope: profile_nickname
            client-authentication-method: client_secret_post
            # 설정을 어떻게 받아 갈거야
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  application:
    name: spring04

  # AWS 설정
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: ${S3_bucket}
      region:
        static: ap-northeast-2

 # 이메일 인증 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000


# 로깅 설정
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace